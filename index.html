<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Katalog</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf_viewer.min.css">
    
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: Arial, sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #flipbook { width: 100%; height: 100%; }
        
        .page { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
        canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* NOVÉ STYLY PRO TEXTLAYER */
        .textLayer {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden;
            opacity: 1; /* Musí být viditelná pro označování textu, ale průhledná */
            z-index: 2; /* Musí ležet NAD canvasem (z-index 1) */
        }
        .textLayer > span {
            color: transparent; /* Text je průhledný, vidíme jen obrázek z canvasu */
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }

        /* --- STYL PRO ZVÝRAZNĚNÍ HLEDANÉHO SLOVA --- */
        .highlight {
            background-color: rgba(255, 255, 0, 0.5); /* Průhledná žlutá */
            border-radius: 3px;
        }

        .nav-arrow { position: absolute; top: 0; height: 100%; width: 60px; background: rgba(0, 0, 0, 0); color: rgba(255, 255, 255, 0.4); border: none; font-size: 30px; cursor: pointer; transition: all 0.2s; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .nav-arrow:hover { background: rgba(0, 0, 0, 0.3); color: #fff; }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        #top-menu { position: absolute; top: 15px; right: 15px; z-index: 20; display: flex; flex-direction: column; gap: 6px; width: 180px; }
        .menu-row { display: flex; gap: 6px; width: 100%; }
        .btn-mini { background-color: rgba(51, 51, 51, 0.85); color: white; border: none; padding: 8px 0; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; text-align: center; transition: background 0.2s; backdrop-filter: blur(5px); flex: 1; }
        .btn-mini:hover { background-color: rgba(85, 85, 85, 0.95); }
        .btn-full { display: block; width: 100%; background-color: rgba(0, 118, 55, 0.9); }
        .btn-full:hover { background-color: rgba(0, 156, 73, 1); }
        .search-box { display: flex; background-color: rgba(51, 51, 51, 0.85); border-radius: 4px; padding: 4px; backdrop-filter: blur(5px); }
        .search-box input { background: transparent; border: none; color: white; padding: 6px; font-size: 13px; width: 100%; outline: none; }
        .search-box input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .search-btn { background: transparent; border: none; color: rgba(255, 255, 255, 0.7); cursor: pointer; padding: 0 8px; font-size: 13px; }
        .search-btn:hover { color: white; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <button class="nav-arrow arrow-left" onclick="$('#flipbook').turn('previous')">◀</button>
        <div id="flipbook"></div>
        <button class="nav-arrow arrow-right" onclick="$('#flipbook').turn('next')">▶</button>
    </div>

    <div id="top-menu">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Hledat..." onkeypress="if(event.key === 'Enter') executeSearch()">
            <button class="search-btn" onclick="executeSearch()">🔍</button>
        </div>
        <div class="menu-row">
            <button class="btn-mini" onclick="$('#flipbook').turn('page', 1)">⏮</button>
            <button class="btn-mini" id="btn-end">⏭</button>
        </div>
        <a href="katalog.pdf" download="katalog.pdf" class="btn-mini btn-full">⬇ Stáhnout</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
