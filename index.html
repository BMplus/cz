<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Katalog</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        /* Kontejner teď využívá celých 100 % výšky obrazovky */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #flipbook {
            width: 100%;
            height: 100%;
        }
        .page {
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        /* --- NOVÉ BOČNÍ ŠIPKY --- */
        .nav-arrow {
            position: absolute;
            top: 0;
            height: 100%;
            width: 60px;
            background: rgba(0, 0, 0, 0);
            color: rgba(255, 255, 255, 0.4);
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-arrow:hover {
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
        }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        /* --- MINI MENU V PRAVÉM HORNÍM ROHU --- */
        #top-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            display: flex;
            gap: 8px;
        }
        .btn-mini {
            background-color: rgba(51, 51, 51, 0.8);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s;
            backdrop-filter: blur(5px); /* Moderní efekt skla */
        }
        .btn-mini:hover {
            background-color: rgba(85, 85, 85, 0.9);
        }
        .btn-download {
            background-color: rgba(0, 118, 55, 0.9);
        }
        .btn-download:hover {
            background-color: rgba(0, 156, 73, 1);
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <button class="nav-arrow arrow-left" onclick="$('#flipbook').turn('previous')">◀</button>
        
        <div id="flipbook"></div>
        
        <button class="nav-arrow arrow-right" onclick="$('#flipbook').turn('next')">▶</button>
    </div>

    <div id="top-menu">
        <button class="btn-mini" onclick="$('#flipbook').turn('page', 1)">⏮ Začátek</button>
        <button class="btn-mini" id="btn-end">Konec ⏭</button>
        <a href="katalog.pdf" download="katalog.pdf" class="btn-mini btn-download">⬇ Stáhnout PDF</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
