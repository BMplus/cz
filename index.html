<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Katalog</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #flipbook {
            width: 90%;
            height: 90%;
        }
        .page {
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        #toolbar {
            height: 60px;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px; /* Mírně zúžený prostor, aby se tam tlačítka hezky vešla */
        }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #555;
        }
        .btn-download {
            background-color: #007637;
        }
        .btn-download:hover {
            background-color: #009c49;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="flipbook"></div>
    </div>

    <div id="toolbar">
        <button class="btn" onclick="$('#flipbook').turn('page', 1)">⏮ Začátek</button>
        <button class="btn" onclick="$('#flipbook').turn('previous')">◀ Předchozí</button>
        <button class="btn" onclick="$('#flipbook').turn('next')">Následující ▶</button>
        <button class="btn" id="btn-end">Konec ⏭</button>
        <a href="katalog.pdf" download="katalog.pdf" class="btn btn-download">⬇ Stáhnout PDF zdarma</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
